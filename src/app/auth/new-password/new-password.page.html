<div class="bg-gradient-to-r from-cyan-400 to-[#16e2eb] pt-14 pb-6 px-4 rounded-b-[40px] shadow-lg shadow-cyan-200/50 flex items-center text-white relative z-10">
  <ion-toolbar style="--background: transparent; --color: white; --border-width: 0;">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/account" icon="arrow-back" class="text-white"></ion-back-button>
    </ion-buttons>

    <ion-title class="font-bold tracking-wide text-lg">Ganti Kata Sandi</ion-title>
  </ion-toolbar>
</div>

<ion-content [fullscreen]="true" class="bg-slate-50">

  <div class="px-6 py-8 flex flex-col justify-between h-full min-h-[80vh] animate-fadeIn">
    
    <div>
      <div class="flex items-start bg-cyan-50 border border-cyan-100 rounded-2xl p-4 mb-8 shadow-xs">
        <ion-icon name="shield-checkmark-outline" class="text-cyan-500 text-xl mr-3 mt-0.5 flex-shrink-0"></ion-icon>
        <p class="text-left m-0 text-xs md:text-sm text-cyan-700 leading-relaxed font-medium">
          Silakan isi data di bawah untuk memperbarui kata sandi. Demi keamanan akun Anda, jangan bagikan kata sandi kepada siapa pun.
        </p>
      </div>

      <form [formGroup]="ChangePasswordForm" (ngSubmit)="onUpdatePassword()" class="bg-white rounded-2xl p-5 border border-slate-100 shadow-sm space-y-5">
        
        <div class="space-y-1.5">
          <label class="text-xs font-bold text-slate-500 uppercase tracking-wider pl-1 block">Kata Sandi Saat Ini</label>
          <div class="relative flex items-center bg-slate-50 border border-slate-200 rounded-xl focus-within:border-cyan-400 focus-within:ring-2 focus-within:ring-cyan-50 transition-all px-3 py-1">
            <ion-icon name="lock-closed-outline" class="text-slate-400 text-lg mr-2.5"></ion-icon>
            <ion-input formControlName="old_password" type="password" placeholder="Masukkan kata sandi lama" class="text-sm font-medium text-slate-800 m-0" required></ion-input>
          </div>
          <div class="pl-1" *ngIf="ChangePasswordForm.get('old_password')?.touched && ChangePasswordForm.get('old_password')?.invalid">
            <small class="text-red-500 font-semibold text-xs flex items-center">
              <ion-icon name="alert-circle-outline" class="mr-1"></ion-icon> Kata sandi wajib diisi.
            </small>
          </div>
        </div>

        <div class="space-y-1.5">
          <label class="text-xs font-bold text-slate-500 uppercase tracking-wider pl-1 block">Kata Sandi Baru</label>
          <div class="relative flex items-center bg-slate-50 border border-slate-200 rounded-xl focus-within:border-cyan-400 focus-within:ring-2 focus-within:ring-cyan-50 transition-all px-3 py-1">
            <ion-icon name="key-outline" class="text-slate-400 text-lg mr-2.5"></ion-icon>
            <ion-input formControlName="new_password" type="password" placeholder="Masukkan kata sandi baru" class="text-sm font-medium text-slate-800 m-0" required></ion-input>
          </div>
          <div class="pl-1" *ngIf="ChangePasswordForm.get('new_password')?.touched && ChangePasswordForm.get('new_password')?.invalid">
            <small class="text-red-500 font-semibold text-xs flex items-center">
              <ion-icon name="alert-circle-outline" class="mr-1"></ion-icon> Kata sandi baru wajib diisi.
            </small>
          </div>
        </div>

        <div class="space-y-1.5">
          <label class="text-xs font-bold text-slate-500 uppercase tracking-wider pl-1 block">Ulangi Kata Sandi Baru</label>
          <div class="relative flex items-center bg-slate-50 border border-slate-200 rounded-xl focus-within:border-cyan-400 focus-within:ring-2 focus-within:ring-cyan-50 transition-all px-3 py-1">
            <ion-icon name="checkmark-circle-outline" class="text-slate-400 text-lg mr-2.5"></ion-icon>
            <ion-input formControlName="new_password_confirmation" type="password" placeholder="Ulangi kata sandi baru" class="text-sm font-medium text-slate-800 m-0" required></ion-input>
          </div>
          
          <div class="pl-1" *ngIf="ChangePasswordForm.get('new_password_confirmation')?.touched && ChangePasswordForm.get('new_password_confirmation')?.invalid">
            <small class="text-red-500 font-semibold text-xs flex items-center">
              <ion-icon name="alert-circle-outline" class="mr-1"></ion-icon> Konfirmasi kata sandi wajib diisi.
            </small>
          </div>
          
          <div class="pl-1" *ngIf="ChangePasswordForm.errors?.['mismatch'] && ChangePasswordForm.get('new_password_confirmation')?.touched">
            <small class="text-red-500 font-semibold text-xs flex items-center">
              <ion-icon name="close-circle-outline" class="mr-1"></ion-icon> Konfirmasi kata sandi tidak cocok.
            </small>
          </div>
        </div>

      </form>
    </div>

    <div class="mt-8">
      <button (click)="onUpdatePassword()" type="submit" [disabled]="ChangePasswordForm.invalid"
        class="w-full bg-cyan-400 disabled:bg-slate-200 disabled:text-slate-400 disabled:shadow-none text-white font-bold py-4 rounded-2xl active:scale-95 transition-all shadow-md shadow-cyan-100 text-sm tracking-wide cursor-pointer">
        Simpan Perubahan
      </button>
    </div>

  </div>

</ion-content>
