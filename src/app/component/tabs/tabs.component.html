<ion-footer class="ion-no-border bg-transparent font-body relative z-50">
  <div class="glass-panel mx-4 mb-4 rounded-3xl flex justify-around items-center py-3 text-slate-400 shadow-xl shadow-cyan-500/10 border border-white/60">

    <div class="flex flex-col items-center transition-all cursor-pointer relative group" tabs="home" routerLink="/home" routerLinkActive="text-[#00bcd4] scale-110 drop-shadow-md">
      <span class="material-symbols-outlined text-2xl group-active:scale-95 transition-transform">home</span>
      
      <span class="text-[10px] font-bold transition-colors duration-300">Beranda</span>
    </div>

    <div class="flex flex-col items-center transition-all cursor-pointer relative group" tabs="events" routerLink="/events" routerLinkActive="text-[#00bcd4] scale-110 drop-shadow-md">
      <span class="material-symbols-outlined text-2xl group-active:scale-95 transition-transform">explore</span>
      
      <span class="text-[10px] font-bold transition-colors duration-300">Jelajah</span>
    </div>

    <div class="flex flex-col items-center transition-all cursor-pointer relative group" tabs="my-tickets" routerLink="/my-tickets" routerLinkActive="text-[#00bcd4] scale-110 drop-shadow-md">
      <span class="material-symbols-outlined text-2xl group-active:scale-95 transition-transform">confirmation_number</span>
      
      <span class="text-[10px] font-bold transition-colors duration-300">Tiket Saya</span>
    </div>

    <div class="flex flex-col items-center transition-all cursor-pointer relative group" tabs="account" routerLink="/account" routerLinkActive="text-[#00bcd4] scale-110 drop-shadow-md">
      <span class="material-symbols-outlined text-2xl group-active:scale-95 transition-transform">person</span>
      
      <span class="text-[10px] font-bold transition-colors duration-300">Akun</span>
    </div>
  </div>
</ion-footer>
