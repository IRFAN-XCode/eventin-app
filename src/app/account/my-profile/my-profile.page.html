<div class="bg-gradient-to-r from-cyan-400 to-[#16e2eb] pt-14 pb-6 px-4 rounded-b-[40px] shadow-lg shadow-cyan-200/50 flex items-center text-white relative z-10">
  <ion-toolbar style="--background: transparent; --color: white; --border-width: 0;">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/account" icon="arrow-back" class="text-white"></ion-back-button>
    </ion-buttons>

    <ion-title class="font-bold tracking-wide text-lg">Detail Akun</ion-title>
  </ion-toolbar>
</div>

<ion-content [fullscreen]="true" style="--background: #f8fafc;">

  <div class="px-5 py-8 flex flex-col" *ngIf="userDetail">

    <div class="bg-white p-6 rounded-[28px] shadow-sm border border-slate-100 flex flex-col space-y-5">

      <div class="flex flex-col">
        <label class="text-xs font-bold text-slate-500 mb-1.5 ml-1 flex items-center">
          <ion-icon name="person" class="mr-1.5 text-cyan-400 text-sm"></ion-icon> Nama Lengkap
        </label>
        <input type="text" value="{{ userDetail.nama || 'Belum diatur' }}" readonly
          class="bg-slate-50 border border-slate-100 rounded-[16px] px-4 py-3.5 w-full text-sm font-extrabold text-slate-800 focus:outline-none transition-colors" />
      </div>

      <div class="flex flex-col">
        <label class="text-xs font-bold text-slate-500 mb-1.5 ml-1 flex items-center">
          <ion-icon name="mail" class="mr-1.5 text-cyan-400 text-sm"></ion-icon> Email
        </label>
        <input type="email" value="{{ userDetail.email }}" readonly
          class="bg-slate-50 border border-slate-100 rounded-[16px] px-4 py-3.5 w-full text-sm font-extrabold text-slate-800 focus:outline-none transition-colors" />
      </div>

      <div class="flex flex-col">
        <label class="text-xs font-bold text-slate-500 mb-1.5 ml-1 flex items-center">
          <ion-icon name="call" class="mr-1.5 text-cyan-400 text-sm"></ion-icon> Nomor Handphone
        </label>
        <input type="tel" value="{{ userDetail.nomor_handphone || 'Belum diatur' }}" readonly
          class="bg-slate-50 border border-slate-100 rounded-[16px] px-4 py-3.5 w-full text-sm font-extrabold text-slate-800 focus:outline-none transition-colors" />
      </div>

      <div class="flex flex-col">
        <label class="text-xs font-bold text-slate-500 mb-1.5 ml-1 flex items-center">
          <ion-icon name="male-female" class="mr-1.5 text-cyan-400 text-sm"></ion-icon> Jenis Kelamin
        </label>
        <input type="text" value="{{ userDetail.jenis_kelamin || 'Belum diatur' }}" readonly
          class="bg-slate-50 border border-slate-100 rounded-[16px] px-4 py-3.5 w-full text-sm font-extrabold text-slate-800 focus:outline-none transition-colors" />
      </div>

    </div>

    <div class="pt-8 pb-4 flex flex-col space-y-4">

      <button routerLink="../account/edit-profile"
        class="w-full bg-gradient-to-r from-cyan-400 to-[#16e2eb] text-white font-bold text-base py-3.5 rounded-2xl shadow-md shadow-cyan-300/50 active:scale-95 transition-all duration-200">
        Edit Profile
      </button>

      <button id="delete-account"
        class="w-full bg-rose-50 border border-rose-100 text-rose-600 font-bold text-base py-3.5 rounded-2xl active:scale-95 active:bg-rose-100 transition-all duration-200 shadow-sm">
        Hapus Akun
      </button>

    </div>

    <ion-alert trigger="delete-account" header="Hapus Akun?" class="bg-alert"
      message="Apakah anda yakin ingin menghapus akun secara permanen?" [buttons]="alertButtons">
    </ion-alert>

  </div>
</ion-content>
